<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<title>レポーティング - CONSTRUCT_PRO</title>
<style>
body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background-color: #faf9f7;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
}
.tabular-nums {
  font-variant-numeric: tabular-nums;
}
</style>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors": {
        "surface": "#faf9f7",
        "outline-variant": "#c1c7cc",
        "on-primary": "#ffffff",
        "on-surface-variant": "#41484c",
        "surface-container-low": "#f4f3f1",
        "primary": "#104356",
        "surface-container-lowest": "#ffffff",
        "on-surface": "#1a1c1b"
      },
      "borderRadius": {
        "DEFAULT": "0.25rem",
        "xl": "12px",
        "2xl": "16px",
      },
      "spacing": {
        "xxl": "64px",
        "container-padding": "32px",
      }
    },
  },
}
</script>
</head>
<body class="bg-surface text-on-surface antialiased overflow-x-hidden">
<div id="header-placeholder"></div>
<script>
fetch('/header.html')
  .then(response => response.text())
  .then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>
<main class="pt-24 pb-16 w-full">
<div class="w-full px-container-padding space-y-3">
<!-- ページタイトル -->
<div class="flex items-center gap-2">
<button class="w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant bg-surface-container-lowest hover:bg-surface-container transition-colors text-on-surface-variant shrink-0" onclick="history.back()">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-on-surface tracking-tight">レポーティング</h1>
</div>

<!-- タブエリア -->
<div class="bg-surface-container-low/50 p-0.5 rounded-xl border border-outline-variant/30 inline-flex gap-0.5">
<button id="btn-customer" class="px-6 py-2 text-xs font-bold text-on-primary bg-primary rounded-lg transition-all shadow-md shadow-primary/10" onclick="setReportType('customer')">顧客別</button>
<button id="btn-vendor" class="px-6 py-2 text-xs font-medium text-on-surface-variant bg-transparent rounded-lg hover:bg-surface-container-lowest transition-all" onclick="setReportType('vendor')">外注先別</button>
</div>

<!-- フィルタエリア -->
<div class="bg-surface-container-low p-3 rounded-2xl border border-outline-variant/30 space-y-2">
<!-- 集計方法 -->
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">集計方法</p>
<div class="inline-flex gap-0.5 bg-surface-container-low/50 p-0.5 rounded-xl border border-outline-variant/30">
<button id="btn-period" class="px-6 py-1.5 text-xs font-bold text-on-primary bg-primary rounded-lg transition-all shadow-md shadow-primary/10" onclick="setAggregateType('period')">期間</button>
<button id="btn-project" class="px-6 py-1.5 text-xs font-medium text-on-surface-variant bg-transparent rounded-lg hover:bg-surface-container-lowest transition-all" onclick="setAggregateType('project')">案件</button>
</div>
</div>

<!-- 期間モードのフィルタ -->
<div id="period-filters" class="grid grid-cols-1 md:grid-cols-3 gap-3">
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">期間開始</label>
<input type="date" id="dateStart" class="w-full bg-surface-container-lowest border-outline-variant/50 rounded-lg text-xs px-3 py-1.5 focus:ring-2 focus:ring-primary/20" onchange="updateReports()"/>
</div>
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">期間終了</label>
<input type="date" id="dateEnd" class="w-full bg-surface-container-lowest border-outline-variant/50 rounded-lg text-xs px-3 py-1.5 focus:ring-2 focus:ring-primary/20" onchange="updateReports()"/>
</div>
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">会社を選択</label>
<select id="companySelect" class="w-full bg-surface-container-lowest border-outline-variant/50 rounded-lg text-xs px-3 py-1.5 focus:ring-2 focus:ring-primary/20" onchange="updateReports()">
<option value="">全社</option>
</select>
</div>
</div>

<!-- 案件モードのフィルタ -->
<div id="project-filters" class="grid grid-cols-1 md:grid-cols-3 gap-3 hidden">
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">案件を選択</label>
<select id="projectSelect" class="w-full bg-surface-container-lowest border-outline-variant/50 rounded-lg text-xs px-3 py-1.5 focus:ring-2 focus:ring-primary/20" onchange="updateReports()">
<option value="">全案件</option>
</select>
</div>
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">会社を選択</label>
<select id="projectCompanySelect" class="w-full bg-surface-container-lowest border-outline-variant/50 rounded-lg text-xs px-3 py-1.5 focus:ring-2 focus:ring-primary/20" onchange="updateReports()">
<option value="">全社</option>
</select>
</div>
</div>
</div>

<!-- メインエリア -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
<!-- 左側：サマリーカード（2x2） -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-lowest rounded-xl p-3 border border-outline-variant/30">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">売上合計</p>
<p class="text-lg font-bold text-primary tabular-nums" id="summary-revenue">¥-</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-3 border border-outline-variant/30">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">平均粗利率</p>
<p class="text-xl font-bold text-on-surface" id="summary-gross-margin">-</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-3 border border-outline-variant/30">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">想定利益率</p>
<p class="text-xl font-bold text-on-surface" id="summary-expected-profit">-</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-3 border border-outline-variant/30">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">実利益合計</p>
<p class="text-lg font-bold text-primary tabular-nums" id="summary-actual-profit">¥-</p>
</div>
</div>

<!-- 右側：グラフ -->
<div class="bg-surface-container-lowest rounded-2xl p-4 border border-outline-variant/30 w-80 h-80">
<h2 class="text-sm font-bold text-on-surface mb-3">ステータス分布</h2>
<canvas id="chartStatus"></canvas>
</div>
</div>

<footer class="pt-16 pb-8 border-t border-outline-variant text-center">
<p class="text-[11px] text-on-surface-variant font-bold uppercase tracking-[0.3em] mb-2">CONSTRUCT_PRO ENTERPRISE SYSTEMS v2.4.0</p>
<p class="text-[11px] text-on-surface-variant/50">© 2024 CONSTRUCT_PRO Systems. All Rights Reserved.</p>
</footer>
</div>
</main>

<script>
let chartStatus = null;

if (!window.appCache) {
  window.appCache = { projects: [], vendors: [], categories: [], orders: [], customers: [] };
}

async function initializeCache() {
  try {
    const res = await fetch('/api/cache');
    window.appCache = await res.json();
  } catch(e) {
    console.error('Failed to load cache:', e);
  }
}

function setAggregateType(type) {
  // Store aggregate type
  if (!document.getElementById('aggregateType')) {
    const input = document.createElement('input');
    input.id = 'aggregateType';
    input.type = 'hidden';
    input.value = type;
    document.body.appendChild(input);
  } else {
    document.getElementById('aggregateType').value = type;
  }

  // Update button states
  const btnPeriod = document.getElementById('btn-period');
  const btnProject = document.getElementById('btn-project');

  if (type === 'period') {
    btnPeriod.classList.remove('bg-transparent', 'text-on-surface-variant', 'font-medium');
    btnPeriod.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');

    btnProject.classList.remove('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');
    btnProject.classList.add('bg-transparent', 'text-on-surface-variant', 'font-medium');

    document.getElementById('period-filters').classList.remove('hidden');
    document.getElementById('project-filters').classList.add('hidden');
  } else {
    btnProject.classList.remove('bg-transparent', 'text-on-surface-variant', 'font-medium');
    btnProject.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');

    btnPeriod.classList.remove('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');
    btnPeriod.classList.add('bg-transparent', 'text-on-surface-variant', 'font-medium');

    document.getElementById('period-filters').classList.add('hidden');
    document.getElementById('project-filters').classList.remove('hidden');
  }

  populateCompanySelect();
  updateReports();
}

function getDateRange() {
  const today = new Date();
  const endDate = document.getElementById('dateEnd').value || today.toISOString().split('T')[0];
  let startDate = document.getElementById('dateStart').value;

  if (!startDate) {
    const threeMonthsAgo = new Date(today);
    threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
    startDate = threeMonthsAgo.toISOString().split('T')[0];
    document.getElementById('dateStart').value = startDate;
  }

  document.getElementById('dateEnd').value = endDate;
  return { startDate, endDate };
}

function filterDataByDate(items, dateField) {
  const { startDate, endDate } = getDateRange();
  return items.filter(item => {
    const date = item[dateField];
    if (!date) return false;
    return date >= startDate && date <= endDate;
  });
}

function setReportType(type) {
  // Hidden input to store the value
  if (!document.getElementById('reportType')) {
    const input = document.createElement('input');
    input.id = 'reportType';
    input.type = 'hidden';
    input.value = type;
    document.body.appendChild(input);
  } else {
    document.getElementById('reportType').value = type;
  }

  // Update tab states
  const btnCustomer = document.getElementById('btn-customer');
  const btnVendor = document.getElementById('btn-vendor');

  if (type === 'customer') {
    btnCustomer.classList.remove('bg-transparent', 'text-on-surface-variant', 'font-medium');
    btnCustomer.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');

    btnVendor.classList.remove('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');
    btnVendor.classList.add('bg-transparent', 'text-on-surface-variant', 'font-medium');
  } else {
    btnVendor.classList.remove('bg-transparent', 'text-on-surface-variant', 'font-medium');
    btnVendor.classList.add('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');

    btnCustomer.classList.remove('bg-primary', 'text-on-primary', 'font-bold', 'shadow-lg', 'shadow-primary/10');
    btnCustomer.classList.add('bg-transparent', 'text-on-surface-variant', 'font-medium');
  }

  populateCompanySelect();
  updateReports();
}

function populateCompanySelect() {
  const reportType = document.getElementById('reportType')?.value || 'customer';
  const aggregateType = document.getElementById('aggregateType')?.value || 'period';

  if (aggregateType === 'period') {
    const companySelect = document.getElementById('companySelect');
    const currentValue = companySelect.value;
    companySelect.innerHTML = '<option value="">全社</option>';

    if (reportType === 'customer') {
      const companies = [...new Set(window.appCache.projects.map(p => p.clientCompany || p.client).filter(Boolean))].sort();
      companies.forEach(company => {
        const option = document.createElement('option');
        option.value = company;
        option.textContent = company;
        companySelect.appendChild(option);
      });
    } else {
      const vendors = [...new Set(window.appCache.orders.map(o => o.vendor).filter(Boolean))].sort();
      vendors.forEach(vendor => {
        const option = document.createElement('option');
        option.value = vendor;
        option.textContent = vendor;
        companySelect.appendChild(option);
      });
    }

    companySelect.value = currentValue;
  } else {
    // Project mode
    const projectSelect = document.getElementById('projectSelect');
    const projectCompanySelect = document.getElementById('projectCompanySelect');
    const currentProject = projectSelect.value;
    const currentCompany = projectCompanySelect.value;

    projectSelect.innerHTML = '<option value="">全案件</option>';
    const projects = [...new Set(window.appCache.projects.map(p => ({ id: p.id, name: p.name })))];
    projects.forEach(project => {
      const option = document.createElement('option');
      option.value = project.id;
      option.textContent = project.name;
      projectSelect.appendChild(option);
    });
    projectSelect.value = currentProject;

    projectCompanySelect.innerHTML = '<option value="">全社</option>';
    if (reportType === 'customer') {
      const companies = [...new Set(window.appCache.projects.map(p => p.clientCompany || p.client).filter(Boolean))].sort();
      companies.forEach(company => {
        const option = document.createElement('option');
        option.value = company;
        option.textContent = company;
        projectCompanySelect.appendChild(option);
      });
    } else {
      const vendors = [...new Set(window.appCache.orders.map(o => o.vendor).filter(Boolean))].sort();
      vendors.forEach(vendor => {
        const option = document.createElement('option');
        option.value = vendor;
        option.textContent = vendor;
        projectCompanySelect.appendChild(option);
      });
    }
    projectCompanySelect.value = currentCompany;
  }
}

function updateReports() {
  const reportType = document.getElementById('reportType')?.value || 'customer';

  if (reportType === 'customer') {
    generateCustomerReport();
  } else {
    generateVendorReport();
  }
}

function generateCustomerReport() {
  const aggregateType = document.getElementById('aggregateType')?.value || 'period';
  let projects = window.appCache.projects;
  let orders = window.appCache.orders;

  if (aggregateType === 'period') {
    const selectedCompany = document.getElementById('companySelect').value;
    projects = filterDataByDate(projects, 'startDate');

    if (selectedCompany) {
      projects = projects.filter(p => (p.clientCompany || p.client) === selectedCompany);
    }

    const projectIds = projects.map(p => p.id);
    orders = orders.filter(o => projectIds.includes(o.project_id));
    const { startDate, endDate } = getDateRange();
    orders = orders.filter(o => {
      const date = o.period_start || '';
      if (!date) return true;
      return date >= startDate && date <= endDate;
    });
  } else {
    const selectedProject = document.getElementById('projectSelect').value;
    const selectedCompany = document.getElementById('projectCompanySelect').value;

    if (selectedProject) {
      projects = projects.filter(p => p.id === parseInt(selectedProject));
    }

    if (selectedCompany) {
      projects = projects.filter(p => (p.clientCompany || p.client) === selectedCompany);
    }

    const projectIds = projects.map(p => p.id);
    orders = orders.filter(o => projectIds.includes(o.project_id));
  }

  const customerMap = {};
  projects.forEach(p => {
    const company = p.clientCompany || p.client || '未設定';
    if (!customerMap[company]) {
      customerMap[company] = { count: 0, revenue: 0, cost: 0, profit: 0, orders: [] };
    }
    customerMap[company].count++;
  });

  orders.forEach(o => {
    const project = window.appCache.projects.find(p => p.id === o.project_id);
    if (!project) return;
    const company = project.clientCompany || project.client || '未設定';
    if (customerMap[company]) {
      customerMap[company].revenue += (o.decided || o.planned || 0);
      customerMap[company].cost += (o.estimate || 0);
      customerMap[company].orders.push(o);
    }
  });

  Object.values(customerMap).forEach(data => {
    data.profit = data.revenue - data.cost;
  });

  const sorted = Object.entries(customerMap)
    .sort((a, b) => b[1].revenue - a[1].revenue);

  renderCharts(sorted, projects, customerMap);
}

function generateVendorReport() {
  const aggregateType = document.getElementById('aggregateType')?.value || 'period';
  let orders = window.appCache.orders;
  let projects = window.appCache.projects;

  if (aggregateType === 'period') {
    const selectedCompany = document.getElementById('companySelect').value;
    const { startDate, endDate } = getDateRange();
    orders = orders.filter(o => {
      const date = o.period_start || '';
      if (!date) return true;
      return date >= startDate && date <= endDate;
    });

    if (selectedCompany) {
      orders = orders.filter(o => o.vendor === selectedCompany);
    }
  } else {
    const selectedProject = document.getElementById('projectSelect').value;
    const selectedCompany = document.getElementById('projectCompanySelect').value;

    if (selectedProject) {
      orders = orders.filter(o => o.project_id === parseInt(selectedProject));
    }

    if (selectedCompany) {
      orders = orders.filter(o => o.vendor === selectedCompany);
    }
  }

  const vendorMap = {};
  orders.forEach(o => {
    const vendor = o.vendor || '未設定';
    if (!vendorMap[vendor]) {
      vendorMap[vendor] = { count: 0, revenue: 0, cost: 0, profit: 0, orders: [] };
    }
    vendorMap[vendor].count++;
    vendorMap[vendor].revenue += (o.decided || o.planned || 0);
    vendorMap[vendor].cost += (o.estimate || 0);
    vendorMap[vendor].orders.push(o);
  });

  Object.values(vendorMap).forEach(data => {
    data.profit = data.revenue - data.cost;
  });

  const sorted = Object.entries(vendorMap)
    .sort((a, b) => b[1].revenue - a[1].revenue);

  renderCharts(sorted, orders, vendorMap);
}

function renderCharts(sorted, allItems, dataMap) {
  const reportType = document.getElementById('reportType')?.value || 'customer';
  const names = sorted.map(([name]) => name);

  updateSummary(sorted, dataMap);

  // ステータス分布 または 見積vs決定
  const ctxStatus = document.getElementById('chartStatus').getContext('2d');
  if (chartStatus) chartStatus.destroy();

  if (reportType === 'customer') {
    const statusMap = {};
    window.appCache.projects.forEach(p => {
      const status = p.status || '未対応';
      statusMap[status] = (statusMap[status] || 0) + 1;
    });

    chartStatus = new Chart(ctxStatus, {
      type: 'doughnut',
      data: {
        labels: Object.keys(statusMap),
        datasets: [{
          data: Object.values(statusMap),
          backgroundColor: ['#104356', '#a33c2d', '#f0bd89', '#2d5a6e', '#ffb4a7'],
        }]
      },
      options: { responsive: true }
    });
  } else {
    const counts = sorted.map(([, data]) => data.count || 0);

    chartStatus = new Chart(ctxStatus, {
      type: 'bar',
      data: {
        labels: names,
        datasets: [{
          label: '依頼件数',
          data: counts,
          backgroundColor: '#104356',
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
      }
    });
  }
}

function updateSummary(sorted, dataMap) {
  // Calculate financial metrics
  const totalRevenue = sorted.reduce((sum, [, data]) => sum + (data.revenue || 0), 0);
  const totalCost = sorted.reduce((sum, [, data]) => sum + (data.cost || 0), 0);
  const totalProfit = sorted.reduce((sum, [, data]) => sum + (data.profit || 0), 0);

  // 売上合計 (Sales Total)
  document.getElementById('summary-revenue').textContent = '¥' + totalRevenue.toLocaleString();

  // 平均粗利率 (Average Gross Margin %)
  const margins = sorted.map(([, data]) => {
    if (data.revenue > 0) {
      return (data.profit / data.revenue) * 100;
    }
    return 0;
  });
  const avgMargin = margins.length > 0 ? margins.reduce((a, b) => a + b, 0) / margins.length : 0;
  document.getElementById('summary-gross-margin').textContent = avgMargin.toFixed(1) + '%';

  // 想定利益率 (Expected Profit Margin %)
  const expectedProfitMargin = totalRevenue > 0 ? (totalProfit / totalRevenue) * 100 : 0;
  document.getElementById('summary-expected-profit').textContent = expectedProfitMargin.toFixed(1) + '%';

  // 実利益合計 (Actual Profit Total)
  document.getElementById('summary-actual-profit').textContent = '¥' + totalProfit.toLocaleString();
}

document.addEventListener('DOMContentLoaded', async () => {
  await initializeCache();
  setAggregateType('period');
  setReportType('customer');
});
</script>
</body>
</html>
