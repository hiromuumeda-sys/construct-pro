<script>
function toggleModal(id, show) {
  const modal = document.getElementById(id);
  let content;
  if (id === 'edit-modal') {
    content = document.getElementById('edit-modal-content');
  } else if (id === 'new-registration-modal') {
    content = document.getElementById('new-modal-content');
  }

  if (!modal || !content) {
    console.error('Modal or content not found:', id);
    return;
  }

  if (show) {
    modal.classList.remove('hidden');
    setTimeout(() => {
      content.classList.remove('scale-95', 'opacity-0');
      content.classList.add('scale-100', 'opacity-100');
    }, 10);
    document.body.style.overflow = 'hidden';
  } else {
    content.classList.add('scale-95', 'opacity-0');
    content.classList.remove('scale-100', 'opacity-100');
    setTimeout(() => {
      modal.classList.add('hidden');
    }, 300);
    document.body.style.overflow = '';
  }
}

let editingId = null;

if (!window.appCache) {
  window.appCache = { projects: [], vendors: [], categories: [], orders: [], customers: [] };
}

function loadCustomers() {
  renderTable(window.appCache.customers);
}

function renderTable(customers) {
  const tbody = document.getElementById('customer-table-body');
  tbody.innerHTML = customers.map(c => `
    <tr class="hover:bg-surface-container-low transition-colors cursor-pointer group" onclick="openEditModal(${c.id})">
      <td class="px-3 py-1.5 text-xs text-center tabular-nums text-on-surface-variant font-medium">${c.id}</td>
      <td class="px-3 py-1.5 text-xs font-bold text-on-surface group-hover:text-primary transition-colors">${c.company}</td>
      <td class="px-3 py-1.5 text-xs text-on-surface-variant">${c.department || '-'}</td>
      <td class="px-3 py-1.5 text-xs font-medium text-on-surface">${c.contact}</td>
      <td class="px-3 py-1.5 text-xs tabular-nums text-on-surface-variant">${c.email}</td>
      <td class="px-3 py-1.5 text-xs tabular-nums text-on-surface-variant">${c.phone || '-'}</td>
      <td class="px-3 py-1.5 text-xs text-on-surface-variant">${c.address || '-'}</td>
    </tr>
  `).join('');
}

function openEditModal(id) {
  editingId = id;
  const c = window.appCache.customers.find(x => x.id === id);
  if(c) {
    document.getElementById('modal-customer-id').value = c.id;
    document.getElementById('modal-company-name').value = c.company;
    document.getElementById('modal-department-name').value = c.department || '';
    document.getElementById('modal-contact-name').value = c.contact;
    document.getElementById('modal-email').value = c.email;
    document.getElementById('modal-phone').value = c.phone || '';
    document.getElementById('modal-address').value = c.address || '';
    document.getElementById('modal-notes').value = c.notes || '';
    toggleModal('edit-modal', true);
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  if (window.appCache.customers.length === 0) {
    const res = await fetch('/api/cache');
    window.appCache = await res.json();
  }
  loadCustomers();

  document.getElementById('btn-new-registration').addEventListener('click', () => {
    editingId = null;
    document.querySelector('[name="company"]').value = '';
    document.querySelector('[name="department"]').value = '';
    document.querySelector('[name="contact"]').value = '';
    document.querySelector('[name="email"]').value = '';
    document.querySelector('[name="phone"]').value = '';
    document.querySelector('[name="address"]').value = '';
    document.querySelector('[name="notes"]').value = '';
    toggleModal('new-registration-modal', true);
  });

  document.getElementById('btn-close-new-modal').addEventListener('click', () => toggleModal('new-registration-modal', false));
  document.getElementById('btn-cancel-new').addEventListener('click', () => toggleModal('new-registration-modal', false));
  document.getElementById('new-modal-overlay').addEventListener('click', () => toggleModal('new-registration-modal', false));

  document.getElementById('btn-close-edit-modal').addEventListener('click', () => toggleModal('edit-modal', false));
  document.getElementById('btn-cancel-edit').addEventListener('click', () => toggleModal('edit-modal', false));
  document.getElementById('edit-modal-overlay').addEventListener('click', () => toggleModal('edit-modal', false));

  document.getElementById('btn-save-edit').addEventListener('click', async () => {
    if(!editingId) return;
    const company = document.getElementById('modal-company-name').value;
    const department = document.getElementById('modal-department-name').value;
    const contact = document.getElementById('modal-contact-name').value;
    const email = document.getElementById('modal-email').value;
    const phone = document.getElementById('modal-phone').value;
    const address = document.getElementById('modal-address').value;
    const notes = document.getElementById('modal-notes').value;

    try {
      await fetch(`/api/customers/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company, department, contact, email, phone, address, notes })
      });
      const customerRes = await fetch('/api/customers');
      window.appCache.customers = await customerRes.json();
      loadCustomers();
      toggleModal('edit-modal', false);
    } catch(e) {
      alert('更新に失敗しました');
    }
  });

  document.getElementById('btn-delete-customer').addEventListener('click', async () => {
    if(!editingId) return;
    if(confirm('この顧客を削除してもよろしいですか？')) {
      try {
        await fetch(`/api/customers/${editingId}`, { method: 'DELETE' });
        const customerRes = await fetch('/api/customers');
        window.appCache.customers = await customerRes.json();
        loadCustomers();
        toggleModal('edit-modal', false);
      } catch(e) {
        alert('削除に失敗しました');
      }
    }
  });

  document.getElementById('btn-submit-new').addEventListener('click', async () => {
    const company = document.querySelector('[name="company"]').value;
    const department = document.querySelector('[name="department"]').value;
    const contact = document.querySelector('[name="contact"]').value;
    const email = document.querySelector('[name="email"]').value;
    const phone = document.querySelector('[name="phone"]').value;
    const address = document.querySelector('[name="address"]').value;
    const notes = document.querySelector('[name="notes"]').value;

    if(!company || !contact || !email) return alert('必須項目を入力してください');

    try {
      await fetch('/api/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ company, department, contact, email, phone, address, notes })
      });
      const customerRes = await fetch('/api/customers');
      window.appCache.customers = await customerRes.json();
      loadCustomers();
      toggleModal('new-registration-modal', false);
    } catch(e) {
      alert('登録に失敗しました');
    }
  });

  document.getElementById('search-keyword').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    const filtered = window.appCache.customers.filter(c =>
      c.company.toLowerCase().includes(keyword) ||
      c.contact.toLowerCase().includes(keyword)
    );
    renderTable(filtered);
  });
});
</script>
</body>
</html>
