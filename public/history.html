<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>履歴詳細 - WIN WIN様デモ</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css?v=42"/>
<script src="/sidebar.js?v=42"></script>
<script src="/auth.js?v=42"></script>
<script src="/header.js?v=42"></script>
<style>
body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.custom-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); }
</style>
</head>
<body class="bg-background text-on-surface">
<!-- Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-screen w-64 z-50 bg-surface-container-lowest border-r border-outline-variant flex flex-col py-6">
<div class="px-6 mb-10">
<h1 class="text-headline-md font-display-lg font-bold text-primary">WIN WIN様</h1>
<p class="text-label-sm text-on-surface-variant tracking-wider uppercase">デモ画面</p>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-6 py-3 text-on-surface-variant hover:bg-surface-container-low transition-colors" href="/reporting.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-label-md">ダッシュボード</span>
</a>
<a class="flex items-center gap-3 px-6 py-3 text-on-surface-variant hover:bg-surface-container-low transition-colors" href="/projects.html">
<span class="material-symbols-outlined">engineering</span>
<span class="text-label-md">受注一覧</span>
</a>
<a class="flex items-center gap-3 px-6 py-3 text-secondary font-bold border-l-4 border-secondary bg-surface-container-low" href="/history.html">
<span class="material-symbols-outlined">history</span>
<span class="text-label-md">履歴詳細</span>
</a>
</nav>
</aside>

<!-- Main Content -->
<main class="ml-48 min-h-screen">
<!-- Top App Bar -->
<header class="sticky top-0 z-40 flex justify-between items-center h-16 px-margin-desktop bg-surface/80 backdrop-blur-md shadow-sm">
<div class="text-headline-sm font-bold text-primary">履歴詳細</div>
<div class="flex items-center gap-3 cursor-pointer group relative" id="user-menu" onclick="toggleUserMenu()">
<div class="text-right">
<p class="text-label-md font-bold text-primary" id="user-name">ユーザー</p>
<p class="text-label-sm text-on-surface-variant" id="user-role">user</p>
</div>
<div class="w-10 h-10 rounded-full bg-secondary text-on-secondary font-bold flex items-center justify-center">👤</div>
<div id="user-menu-panel" class="absolute right-0 top-full mt-2 w-48 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-lg hidden" onclick="event.stopPropagation()">
<a href="#" onclick="Auth.logout(); return false;" class="flex items-center gap-3 px-4 py-3 text-on-surface hover:bg-surface-container-low text-body-sm">
<span class="material-symbols-outlined">logout</span>
ログアウト
</a>
</div>
</div>
</header>

<!-- Content -->
<div class="p-margin-desktop space-y-lg max-w-container-max mx-auto">
<div class="flex justify-between items-center">
<h2 class="text-[18px] font-label-md text-primary">最近の操作</h2>
<span class="text-label-sm text-on-surface-variant" id="history-count"></span>
</div>

<!-- Filter -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block text-label-md text-on-surface-variant font-bold mb-2">対象画面</label>
<select id="table-filter" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-2 text-body-md focus:ring-2 focus:ring-secondary/20" onchange="loadLogs()">
<option value="">すべて</option>
<option value="projects">受注一覧</option>
<option value="orders">工事計画</option>
<option value="customers">顧客マスタ</option>
<option value="vendors">発注先マスタ</option>
<option value="categories">工事区分マスタ</option>
<option value="receipts">売上・入金管理</option>
<option value="invitations">アカウント発行</option>
</select>
</div>
<div>
<label class="block text-label-md text-on-surface-variant font-bold mb-2">操作</label>
<select id="action-filter" class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-2 text-body-md focus:ring-2 focus:ring-secondary/20" onchange="loadLogs()">
<option value="">すべて</option>
<option value="CREATE">新規作成</option>
<option value="UPDATE">更新</option>
<option value="DELETE">削除</option>
</select>
</div>
</div>
</div>

<!-- Data Table -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden">
<div class="overflow-auto" style="max-height: 600px;">
<table class="w-full text-left border-collapse">
<thead class="bg-surface sticky top-0 z-10">
<tr>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">日時</th>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">操作</th>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">種別</th>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">対象</th>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider min-w-[320px]">変更内容</th>
<th class="px-lg py-2 text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">操作者</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant" id="history-table-body">
<tr><td colspan="6" class="px-lg py-4 text-center text-on-surface-variant">読み込み中...</td></tr>
</tbody>
</table>
</div>
</div>

<!-- Empty State -->
<div id="empty-state" class="bg-surface-container-lowest border border-outline-variant rounded-lg p-lg text-center hidden">
<span class="material-symbols-outlined text-4xl text-on-surface-variant/30 block mb-2">history</span>
<p class="text-on-surface-variant">履歴がありません</p>
</div>
</div>

<!-- Footer -->
<footer class="border-t border-outline-variant mt-xl py-lg px-margin-desktop text-center text-on-surface-variant">
<p class="text-label-sm uppercase tracking-wider mb-1">WIN WIN様 デモ画面 v2.4.0</p>
<p class="text-body-sm">© 2024 株式会社WIN WIN デモ環境</p>
</footer>
</main>

<script>
function toggleUserMenu() {
  const panel = document.getElementById('user-menu-panel');
  panel.classList.toggle('hidden');
}

document.addEventListener('click', (e) => {
  const panel = document.getElementById('user-menu-panel');
  const menu = document.getElementById('user-menu');
  if (!menu.contains(e.target)) panel.classList.add('hidden');
});

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}

function setupUserInfo() {
  const user = Auth.getUser();
  if (user) {
    const nEl = document.getElementById('user-name'); if (nEl) nEl.textContent = user.name || user.email;
    const rEl = document.getElementById('user-role'); if (rEl) rEl.textContent = user.role || 'user';
  }
}

async function loadLogs() {
  const tableFilter = document.getElementById('table-filter').value;
  const actionFilter = document.getElementById('action-filter').value;
  const tbody = document.getElementById('history-table-body');
  const emptyState = document.getElementById('empty-state');

  try {
    const url = tableFilter
      ? `/api/audit-logs/${tableFilter}`
      : '/api/audit-logs';

    const res = await fetch(url, { headers: Auth.headers() });
    const logs = await res.json();

    let filtered = logs || [];
    if (actionFilter) {
      filtered = filtered.filter(l => l.action === actionFilter);
    }

    document.getElementById('history-count').textContent = `全 ${filtered.length} 件`;

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-lg py-4 text-center text-on-surface-variant">履歴がありません</td></tr>';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    // 種別は画面名（サイドメニュー）で表示する
    const TABLE_LABEL = { projects:'受注一覧', orders:'工事計画', vendors:'発注先マスタ', categories:'工事区分マスタ', customers:'顧客マスタ', receipts:'売上・入金管理', invoices:'受注一覧', users:'ログイン', invitations:'アカウント発行' };
    const ACTION_LABEL = { CREATE:'新規作成', UPDATE:'更新', DELETE:'削除' };
    tbody.innerHTML = filtered.map(log => {
      const dt = new Date(log.created_at);
      const dateStr = dt.toLocaleString('ja-JP');
      // details は jsonb（pgはオブジェクトで返す）/ 文字列の両対応
      let details = log.details || {};
      if (typeof details === 'string') { try { details = JSON.parse(details); } catch(_) { details = {}; } }
      const target = details.name || details.company || details.category || details.invoice_no || details.email || `#${log.record_id}`;
      const changes = Array.isArray(details.changes) ? details.changes : [];
      const changesHtml = changes.length
        ? changes.map(c => `<div>${esc(c)}</div>`).join('')
        : '<span class="text-on-surface-variant/50">変更なし</span>';
      return `<tr class="hover:bg-surface-container-low transition-colors align-top">
        <td class="px-lg py-2 text-body-sm whitespace-nowrap">${dateStr}</td>
        <td class="px-lg py-2 text-body-sm"><span class="px-2 py-1 rounded text-xs font-bold whitespace-nowrap ${
          log.action === 'CREATE' ? 'bg-success-container text-on-success-container' :
          log.action === 'UPDATE' ? 'bg-warning-container text-on-warning-container' :
          'bg-error-container text-on-error-container'
        }">${ACTION_LABEL[log.action] || log.action}</span></td>
        <td class="px-lg py-2 text-body-sm whitespace-nowrap">${TABLE_LABEL[log.table_name] || log.table_name || '-'}</td>
        <td class="px-lg py-2 text-body-sm text-on-surface-variant">${esc(target)}</td>
        <td class="px-lg py-2 text-body-sm space-y-0.5">${changesHtml}</td>
        <td class="px-lg py-2 text-body-sm whitespace-nowrap">${log.email || 'システム'}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    console.error('Failed to load logs:', e);
    tbody.innerHTML = '<tr><td colspan="6" class="px-lg py-4 text-center text-error">読み込みエラー</td></tr>';
  }
}

setupUserInfo();
loadLogs();
</script>
<script src="/notify.js?v=42"></script>
</body>
</html>
