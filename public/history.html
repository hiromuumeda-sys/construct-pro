// 種別選択
function selectType(type) {
  if (!type) {
    document.getElementById('tableContainer').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  const typeNames = { project: '案件', order: '注文', vendor: '外注先' };
  document.getElementById('pageTitle').textContent = `履歴詳細 - ${typeNames[type]}`;

  const data = testData[type] || [];
  const tbody = document.getElementById('history-table-body');

  tbody.innerHTML = data.map(item => `
    <tr class="hover:bg-surface-container-low transition-colors">
      <td class="px-3 py-1.5 text-xs tabular-nums text-on-surface-variant">${item.datetime}</td>
      <td class="px-3 py-1.5 text-xs font-bold text-on-surface">${item.name}</td>
      <td class="px-3 py-1.5 text-xs text-on-surface-variant">${item.changes}</td>
      <td class="px-3 py-1.5 text-xs text-on-surface-variant">${item.operator}</td>
    </tr>
  `).join('');

  document.getElementById('tableContainer').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  updateQueryParam(type);
}

// URL パラメータ更新
function updateQueryParam(type) {
  const url = new URL(window.location);
  url.searchParams.set('type', type);
  window.history.pushState({}, '', url);
}

// 初期化
(function() {
  const type = new URLSearchParams(window.location.search).get('type');
  if (type && testData[type]) {
    document.getElementById('typeSelect').value = type;
    selectType(type);
  }
})();
</script>
