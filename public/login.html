<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ログイン - WIN WIN様デモ</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css?v=35"/>
<style>
body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.custom-shadow { box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08); }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-margin-mobile">

<div class="w-full max-w-md">
<!-- ブランド -->
<div class="text-center mb-lg">
<img src="/logo.png" alt="WIN WIN" style="height:48px;width:auto;margin:0 auto;display:block"
  onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
<h1 class="text-display-lg font-bold text-primary" style="display:none">WIN WIN様</h1>
<p class="text-label-sm text-on-surface-variant tracking-wider uppercase mt-1">デモ画面</p>
</div>

<!-- ログインカード -->
<div class="bg-surface-container-lowest rounded-2xl custom-shadow border border-outline-variant p-lg">
<div id="login-view">
<h2 class="text-headline-sm text-primary mb-1">ログイン</h2>
<p class="text-body-sm text-on-surface-variant mb-lg">社内業務システムにサインインしてください</p>

<form id="login-form" class="space-y-md" onsubmit="return handleLogin(event)">
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">メールアドレス</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input id="login-email" type="email" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md pl-12 pr-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="admin@example.com" required/>
</div>
</div>
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">パスワード</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input id="login-pw" type="password" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md pl-12 pr-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="パスワード" required/>
</div>
</div>
<div id="login-error" class="text-on-error bg-error-container border border-error rounded-lg px-md py-2 text-body-sm hidden"></div>
<button type="submit" class="w-full px-4 py-1.5 bg-secondary text-on-secondary font-label-md rounded-lg shadow-lg hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">login</span>
ログイン
</button>
</form>

<div class="mt-lg pt-md border-t border-outline-variant">
<p class="text-label-sm text-on-surface-variant text-center">初めてですか？ <a href="#" onclick="showSignup()" class="text-secondary hover:underline font-bold">新規登録</a></p>
</div>
</div>

<div id="signup-view" class="hidden">
<h2 class="text-headline-sm text-primary mb-1">新規登録</h2>
<p class="text-body-sm text-on-surface-variant mb-lg">新しいアカウントを作成します</p>

<form id="signup-form" class="space-y-md" onsubmit="return handleSignup(event)">
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">お名前</label>
<input id="signup-name" type="text" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md px-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="山田太郎" required/>
</div>
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">メールアドレス</label>
<input id="signup-email" type="email" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md px-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="user@example.com" required/>
</div>
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">パスワード（8文字以上）</label>
<input id="signup-pw" type="password" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md px-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="password" minlength="8" required/>
</div>
<div id="signup-error" class="text-on-error bg-error-container border border-error rounded-lg px-md py-2 text-body-sm hidden"></div>
<button type="submit" class="w-full px-4 py-1.5 bg-secondary text-on-secondary font-label-md rounded-lg shadow-lg hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">app_registration</span>
登録する
</button>
</form>

<div class="mt-lg pt-md border-t border-outline-variant">
<p class="text-label-sm text-on-surface-variant text-center">既にアカウントをお持ちですか？ <a href="#" onclick="showLogin()" class="text-secondary hover:underline font-bold">ログイン</a></p>
</div>
</div>
</div>

<p class="text-label-sm text-on-surface-variant text-center mt-lg">© 2024 株式会社WIN WIN デモ環境</p>
</div>

<script>
const API_URL = window.location.origin;

function showLogin() { document.getElementById('login-view').classList.remove('hidden'); document.getElementById('signup-view').classList.add('hidden'); }
function showSignup() { document.getElementById('login-view').classList.add('hidden'); document.getElementById('signup-view').classList.remove('hidden'); }

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pw').value;
  const errorEl = document.getElementById('login-error');

  try {
    errorEl.classList.add('hidden');
    const res = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'ログインに失敗しました';
      errorEl.classList.remove('hidden');
      return false;
    }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/projects.html';
  } catch (err) {
    errorEl.textContent = 'エラーが発生しました：' + err.message;
    errorEl.classList.remove('hidden');
  }
  return false;
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-pw').value;
  const errorEl = document.getElementById('signup-error');

  try {
    errorEl.classList.add('hidden');
    const res = await fetch(`${API_URL}/api/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || '登録に失敗しました';
      errorEl.classList.remove('hidden');
      return false;
    }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    alert('登録が完了しました！');
    window.location.href = '/projects.html';
  } catch (err) {
    errorEl.textContent = 'エラーが発生しました：' + err.message;
    errorEl.classList.remove('hidden');
  }
  return false;
}
</script>
</body>
</html>
