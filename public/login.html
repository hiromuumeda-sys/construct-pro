<!DOCTYPE html>
<html class="light" lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ログイン - WIN WIN様デモ</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/theme.js"></script>
<style>
body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.custom-shadow { box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08); }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-margin-mobile">

<div class="w-full max-w-md">
<!-- ブランド -->
<div class="text-center mb-lg">
<h1 class="text-display-lg font-bold text-primary">WIN WIN様</h1>
<p class="text-label-sm text-on-surface-variant tracking-wider uppercase mt-1">デモ画面</p>
</div>

<!-- ログインカード -->
<div class="bg-surface-container-lowest rounded-2xl custom-shadow border border-outline-variant p-lg">
<h2 class="text-headline-sm text-primary mb-1">ログイン</h2>
<p class="text-body-sm text-on-surface-variant mb-lg">社内業務システムにサインインしてください</p>

<form id="login-form" class="space-y-md" onsubmit="return doLogin(event)">
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">ユーザーID / メールアドレス</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input id="login-id" type="text" value="admin@winwin.co.jp" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md pl-12 pr-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="admin@winwin.co.jp"/>
</div>
</div>
<div>
<label class="block text-label-md text-on-surface-variant uppercase tracking-wider font-bold mb-2">パスワード</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input id="login-pw" type="password" value="demo1234" class="w-full bg-surface-container-low border border-outline-variant rounded-lg text-body-md pl-12 pr-4 py-3 focus:ring-2 focus:ring-secondary/20 focus:border-transparent" placeholder="パスワード"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 text-body-sm text-on-surface-variant cursor-pointer">
<input type="checkbox" id="remember" checked class="rounded border-outline-variant text-secondary focus:ring-secondary/20"/>
ログイン状態を保持
</label>
<a href="#" class="text-body-sm text-secondary hover:underline" onclick="return false;">パスワードをお忘れですか？</a>
</div>
<button type="submit" class="w-full px-4 py-1.5 bg-secondary text-on-secondary font-label-md rounded-lg shadow-lg hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">login</span>
ログイン
</button>
</form>

<div class="mt-lg pt-md border-t border-outline-variant">
<p class="text-label-sm text-on-surface-variant text-center">デモ環境：そのまま「ログイン」を押すとシステムに入れます</p>
</div>
</div>

<p class="text-label-sm text-on-surface-variant text-center mt-lg">© 2024 株式会社WIN WIN デモ環境</p>
</div>

<script>
function doLogin(e) {
  e.preventDefault();
  // デモ：認証は行わず、ログイン状態を記録して受注一覧へ遷移
  try { sessionStorage.setItem('ww_logged_in', '1'); } catch(_) {}
  window.location.href = '/projects.html';
  return false;
}
</script>
</body>
</html>
